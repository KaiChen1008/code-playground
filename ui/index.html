<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>code</title>
    <link rel="icon" href="/favicon.svg?v=123" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.41.0/min/vs/loader.js"></script>
    <style>
        :root {
            --ig-bg: #fafafa;
            --ig-card-bg: #ffffff;
            --ig-border: #dbdbdb;
            --ig-text: #262626;
            --ig-secondary-text: #8e8e8e;
            --ig-blue: #0095f6;
            --ig-red: #ed4956;
            --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background-color: var(--ig-bg);
            color: var(--ig-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--ig-border);
            box-sizing: border-box;
            background-color: var(--ig-card-bg);
            z-index: 100;
        }

        .logo {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: var(--ig-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            letter-spacing: -1px;
        }

        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        select {
            background-color: var(--ig-bg);
            color: var(--ig-text);
            border: 1px solid var(--ig-border);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        .btn {
            border: none;
            padding: 7px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:active {
            opacity: 0.7;
        }

        .btn-primary {
            background-color: var(--ig-blue);
            color: white;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--ig-text);
            border: 1px solid var(--ig-border);
        }

        .btn-danger {
            background-color: transparent;
            color: var(--ig-red);
        }

        main {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            box-sizing: border-box;
            overflow: hidden;
            min-height: 0;
        }

        .card {
            background-color: var(--ig-card-bg);
            border: 1px solid var(--ig-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .editor-card {
            flex: 3;
        }

        .output-card {
            flex: 1;
            min-height: 120px;
        }

        .card-header {
            padding: 12px 16px;
            background-color: #f8f9fa;
            border-bottom: 1px solid var(--ig-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--ig-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        #editor-container {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
        }

        #output {
            padding: 16px;
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #262626;
            white-space: pre-wrap;
            overflow-y: auto;
            background-color: #ffffff;
        }

        .snippet-info {
            font-size: 14px;
            color: var(--ig-secondary-text);
        }

        .snippet-id {
            color: var(--ig-blue);
            font-weight: 600;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            header {
                padding: 8px 12px;
            }

            .logo {
                font-size: 20px;
            }

            .controls {
                gap: 8px;
            }

            .btn span {
                display: none;
            }

            .btn {
                padding: 7px 10px;
            }

            main {
                padding: 12px;
                gap: 12px;
            }

            .editor-card {
                flex: 6;
            }

            .output-card {
                flex: 4;
                min-height: 100px;
            }

            .card-header {
                padding: 8px 12px;
            }

            .user-avatar {
                width: 24px;
                height: 24px;
                font-size: 10px;
            }

            .snippet-info {
                font-size: 12px;
            }

            .card-title {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo" onclick="window.location.href='/'">code</div>
        <div class="controls">
            <select id="language">
                <!-- Will be populated dynamically -->
            </select>
            <button id="run-btn" class="btn btn-primary"><i class="fas fa-play"></i> <span>Run</span></button>
            <button id="delete-btn" class="btn btn-danger" style="display:none;"><i class="fas fa-trash"></i></button>
        </div>
    </header>

    <main>
        <div class="card editor-card">
            <div class="card-header">
                <div class="card-title">
                    <div class="user-avatar">S</div>
                    <span id="display-lang">main.go</span>
                    <span id="display-ver"
                        style="color:var(--ig-secondary-text); font-size:12px; font-weight:normal;"></span>
                </div>
                <button id="format-btn" class="btn btn-secondary"><i class="fas fa-magic"></i>
                    <span>Format</span></button>
            </div>
            <div id="editor-container"></div>
        </div>

        <div class="card output-card">
            <div class="card-header">
                <div class="card-title">Console Output</div>
                <div id="snippet-info" class="snippet-info"></div>
            </div>
            <pre id="output">Welcome to code. Write code and press Run.</pre>
        </div>
    </main>

    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.41.0/min/vs' } });

        let editor;
        let snippetId = null;
        let originalCode = "";
        let languages = {};

        const samples = {
            'python': 'print("Hello, code!")',
            'javascript': 'console.log("Hello, code!");',
            'golang': `package main\n\nimport "fmt"\n\nfunc main() {\n\tfmt.Println("Hello, code!")\n}`,
            'rust': `fn main() {\n    println!("Hello, code!");\n}`,
            'cpp': `#include <iostream>\n\nint main() {\n    std::cout << "Hello, code!" << std::endl;\n    return 0;\n}`
        };

        const extensions = { 'golang': 'go', 'python': 'py', 'javascript': 'js', 'rust': 'rs', 'cpp': 'cpp' };

        require(['vs/editor/editor.main'], async function () {
            monaco.editor.defineTheme('code-light', {
                base: 'vs',
                inherit: true,
                rules: [
                    { token: 'keyword', foreground: 'd73a49', fontStyle: 'bold' },
                    { token: 'comment', foreground: '6a737d', fontStyle: 'italic' },
                    { token: 'string', foreground: '032f62' },
                    { token: 'number', foreground: '005cc5' },
                    { token: 'type', foreground: '6f42c1' },
                    { token: 'function', foreground: '005cc5' }
                ],
                colors: {
                    'editor.background': '#ffffff',
                    'editor.lineHighlightBackground': '#f6f8fa',
                    'editorCursor.foreground': '#24292e',
                    'editorIndentGuide.background': '#e1e4e8',
                    'editor.selectionBackground': '#0366d625'
                }
            });

            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: samples['golang'],
                language: 'go',
                theme: 'code-light',
                automaticLayout: true,
                fontSize: 14,
                padding: { top: 16 },
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                lineNumbers: 'on',
                renderLineHighlight: 'all',
                fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
                fontWeight: "400",
                lineHeight: 22,
                cursorSmoothCaretAnimation: "on",
                cursorBlinking: "smooth"
            });

            await fetchLanguages();

            const pathId = window.location.pathname.substring(1);
            if (pathId && pathId.length === 6) {
                loadSnippet(pathId);
            } else {
                updateLanguageDisplay('golang');
            }

            async function formatCode() {
                const language = document.getElementById('language').value;
                const code = editor.getValue();

                if (language === 'golang') {
                    try {
                        const resp = await fetch('/api/v1/format', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ language, code })
                        });
                        const data = await resp.json();
                        if (data.code) {
                            editor.setValue(data.code);
                        }
                    } catch (err) {
                        console.error('Format error:', err);
                    }
                } else {
                    editor.getAction('editor.action.formatDocument').run();
                }
            }

            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, formatCode);

            document.getElementById('language').addEventListener('change', (e) => {
                const lang = e.target.value;

                // Task 1: Reset the code block and start a new code
                snippetId = null;
                originalCode = samples[lang] || "";
                editor.setValue(originalCode);
                history.pushState(null, '', `/`);
                updateSnippetInfo();

                const model = editor.getModel();
                let monacoLang = lang === 'golang' ? 'go' : lang;
                monaco.editor.setModelLanguage(model, monacoLang);

                updateLanguageDisplay(lang);
            });

            document.getElementById('format-btn').addEventListener('click', formatCode);

            document.getElementById('run-btn').addEventListener('click', async () => {
                const language = document.getElementById('language').value;
                const code = editor.getValue();
                const outputEl = document.getElementById('output');
                outputEl.textContent = 'Running...';

                const body = { language, code };
                if (snippetId && code === originalCode) {
                    body.id = snippetId;
                }

                try {
                    const resp = await fetch('/api/v1/run', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    const data = await resp.json();
                    if (data.error) {
                        outputEl.textContent = 'Error: ' + data.error;
                    } else {
                        outputEl.textContent = data.output;
                        if (data.id) {
                            snippetId = data.id;
                            originalCode = code;
                            history.pushState(null, '', `/${snippetId}`);
                            updateSnippetInfo();
                        }
                    }
                } catch (err) {
                    outputEl.textContent = 'Error: ' + err.message;
                }
            });

            document.getElementById('delete-btn').addEventListener('click', async () => {
                if (!snippetId) return;
                if (!confirm('Are you sure you want to delete this snippet?')) return;

                try {
                    const resp = await fetch(`/api/v1/snippet/${snippetId}`, { method: 'DELETE' });
                    if (resp.ok) {
                        window.location.href = '/';
                    } else {
                        alert('Failed to delete');
                    }
                } catch (err) {
                    alert('Error: ' + err.message);
                }
            });
        });

        async function fetchLanguages() {
            try {
                const resp = await fetch('/api/v1/languages');
                const data = await resp.json();
                const select = document.getElementById('language');
                select.innerHTML = '';
                data.forEach(lang => {
                    languages[lang.name] = lang.version;
                    const option = document.createElement('option');
                    option.value = lang.name;
                    option.textContent = lang.name.charAt(0).toUpperCase() + lang.name.slice(1);
                    if (lang.name === 'golang') option.selected = true;
                    select.appendChild(option);
                });
            } catch (err) {
                console.error('Failed to fetch languages', err);
            }
        }

        function updateLanguageDisplay(lang) {
            const ext = extensions[lang] || 'txt';
            document.getElementById('display-lang').textContent = `main.${ext}`;
            const ver = languages[lang] || "";
            document.getElementById('display-ver').textContent = ver ? `(${ver})` : "";
        }

        async function loadSnippet(id) {
            try {
                const resp = await fetch(`/api/v1/snippet/${id}`);
                if (resp.ok) {
                    const data = await resp.json();
                    snippetId = data.id;
                    originalCode = data.code;
                    editor.setValue(data.code);
                    document.getElementById('language').value = data.language;

                    const model = editor.getModel();
                    const monacoLang = data.language === 'golang' ? 'go' : data.language;
                    monaco.editor.setModelLanguage(model, monacoLang);

                    updateLanguageDisplay(data.language);

                    // Task 3: Show stored result
                    if (data.output) {
                        document.getElementById('output').textContent = data.output;
                    }

                    updateSnippetInfo();
                }
            } catch (err) {
                console.error('Failed to load snippet', err);
            }
        }

        function updateSnippetInfo() {
            const info = document.getElementById('snippet-info');
            const delBtn = document.getElementById('delete-btn');
            if (snippetId) {
                info.innerHTML = `Snippet ID: <span class="snippet-id">${snippetId}</span>`;
                delBtn.style.display = 'inline-block';
            } else {
                info.textContent = '';
                delBtn.style.display = 'none';
            }
        }
    </script>
</body>

</html>
